<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ellis Canvas Tents — Interior Configuration Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root{
  --site-bg:#F1EBE2;--site-fg:#6D5134;--site-muted:#8a6b4a;--site-rule:rgba(109,81,52,.12);
  --cover:#4a3928;--cover-dk:#352a1c;--spine:#5c4a36;
  --page:#ede4d3;--page-dk:#d6c8ad;--foxing:rgba(160,120,70,.12);
  --ink:#6D5134;--ink-med:rgba(109,81,52,.6);--ink-light:rgba(109,81,52,.32);--ink-ghost:rgba(109,81,52,.14);
  --hdr-h:auto;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--site-bg);color:var(--site-fg);font-family:'Cormorant Garamond',Georgia,serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* ── STICKY HEADER ── */
.site-hdr{flex-shrink:0;text-align:center;padding:14px 24px 0;background:var(--site-bg);border-bottom:1px solid var(--site-rule);z-index:100}
.site-hdr h1{font-weight:400;font-size:13px;letter-spacing:5px;text-transform:uppercase;color:var(--site-fg);opacity:.55;margin-bottom:2px}
.site-hdr .title{font-weight:700;font-size:clamp(20px,2.8vw,28px);color:var(--site-fg);letter-spacing:.5px;margin-top:0;line-height:1.15}
.ctrl-strip{display:flex;justify-content:center;align-items:center;gap:2px;padding:10px 8px 0;flex-wrap:wrap}
.nav-btn{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;color:var(--site-muted);padding:3px 14px 6px;cursor:pointer;transition:all .3s}
.nav-btn:hover{color:var(--site-fg)}.nav-btn.on{color:var(--site-fg);border-bottom-color:var(--site-fg)}
.ctrl-div{width:1px;height:16px;background:var(--site-rule);margin:0 6px}
.sz-btn{font-family:'Special Elite',monospace;font-size:12px;background:none;border:none;color:var(--site-muted);padding:3px 9px;cursor:pointer;transition:all .25s;border-radius:2px}
.sz-btn:hover{color:var(--site-fg)}.sz-btn.on{color:var(--site-fg);background:rgba(0,0,0,.06)}

/* ── MAIN TWO-PANEL ── */
.main{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;min-height:0}

/* ── LEFT: DRAWING ── */
.panel-draw{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px;overflow:hidden}
.plate-wrap{background:var(--page);border-radius:4px;
  box-shadow:0 2px 16px rgba(0,0,0,.1);overflow:hidden;position:relative;width:100%;max-width:640px}
.plate-wrap::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:none}
.plate-inner{position:relative;padding:12px 16px 8px 16px}
.plate-inner::before{display:none}
.plate{position:relative;z-index:3;border:1px solid rgba(44,32,21,.12);padding:2px;background:rgba(255,252,245,.4)}
.plate::before{content:'';position:absolute;inset:3px;border:1px solid rgba(44,32,21,.06);pointer-events:none;z-index:5}
.plate canvas{display:block;width:100%;height:auto}
.opt-bar{display:flex;justify-content:center;gap:5px;padding:2px 4px 8px;flex-wrap:wrap;position:relative;z-index:3}
.opt-btn{font-family:'Special Elite',monospace;font-size:12px;background:none;border:1px solid var(--ink-ghost);color:var(--site-muted);padding:4px 14px;cursor:pointer;transition:all .2s;border-radius:2px}
.opt-btn:hover{color:var(--site-fg);border-color:var(--ink-light)}
.opt-btn.on{color:var(--site-fg);border-color:rgba(109,81,52,.4);background:rgba(109,81,52,.06)}

/* ── RIGHT: SPECS (scrollable) ── */
.panel-specs{overflow-y:auto;padding:24px 36px 40px 32px;border-left:1px solid var(--site-rule)}
/* ── SPECS PANEL: ANNOTATION BLOCK ── */
.annot{padding:0 4px 14px}
.annot h3{font-weight:700;font-size:30px;letter-spacing:.5px;color:var(--ink);margin-bottom:5px;line-height:1.15}
.annot p{font-family:'IM Fell English',serif;font-style:italic;font-size:18px;color:var(--ink-med);line-height:1.6;max-width:480px}
.badge-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;font-family:'Special Elite',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:1px}
.badge::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%}
.badge-y{color:var(--ink);border:1px solid var(--ink-light);background:rgba(44,32,21,.03)}.badge-y::before{background:var(--ink)}
.badge-n{color:var(--ink-light);border:1px solid var(--ink-ghost)}.badge-n::before{background:var(--ink-ghost)}
.specs-rule{height:1px;background:var(--ink-ghost);margin:0 0 12px}

/* ── SPECS PANEL: SECTIONS ── */
.spec-section{margin-bottom:16px}
.spec-hdr{display:flex;align-items:center;gap:8px;padding:0 0 7px;margin-bottom:2px;border-bottom:1px solid var(--ink-light)}
.spec-hdr-text{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:17px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink)}
.spec-hdr-rule{flex:1;height:1px;background:transparent}

/* ── SPECS PANEL: SHACKLETON DUAL-COL ── */
.spec-cols{display:grid;grid-template-columns:1fr 1fr;margin-bottom:4px}
.spec-col{padding:6px 10px 8px}
.spec-col:first-child{border-right:1px solid var(--ink-ghost)}
.spec-col .col-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--ink-ghost)}
.spec-col .sl{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px solid rgba(44,32,21,.04)}
.spec-col .sl:last-child{border-bottom:none}
.spec-col .sl .k{font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:rgba(109,81,52,.62)}
.spec-col .sl .v{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--ink);text-align:right;font-weight:600}

/* ── SPECS PANEL: GEAR ROWS ── */
.gear-item{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid rgba(109,81,52,.06)}
.gear-item:last-child{border-bottom:none}
.gear-item .k{font-family:'Special Elite',monospace;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:rgba(44,32,21,.62);flex-shrink:0}
.gear-item .v{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--ink);text-align:right;font-weight:600;padding-left:16px}



/* ── MOBILE (<960px) ── */
@media(max-width:960px){
  html,body{height:auto;overflow:auto}
  body{display:block}
  .main{display:block;overflow:visible}
  .panel-draw{padding:8px 12px}
  .plate-wrap{max-width:500px;margin:0 auto}
  .panel-specs{border-left:none;padding:12px 16px 48px;overflow-y:visible}
}
@media(max-width:600px){
  .site-hdr{padding:8px 12px 6px}
  .site-hdr h1{font-size:9px;letter-spacing:4px}
  .site-hdr .title{font-size:16px}
  .ctrl-strip{gap:2px;padding:4px 4px 0}
  .nav-btn{font-size:10px;padding:2px 6px 3px;letter-spacing:1px}
  .sz-btn{font-size:10px;padding:2px 5px}
  .ctrl-div{height:10px;margin:0 2px}
  .plate-inner{padding:8px 10px 6px 14px}
  .opt-btn{font-size:10px;padding:3px 8px}
  .spec-cols{grid-template-columns:1fr}
  .spec-col:first-child{border-right:none;border-bottom:1px solid var(--ink-ghost)}
}
</style>
</head>
<body>
<header class="site-hdr">
  <div class="title">Interior Configuration Guide</div>
  <div class="ctrl-strip">
    <span id="LN"></span>
    <span class="ctrl-div"></span>
    <span id="SN"></span>
  </div>
</header>
<div class="main">
  <div class="panel-draw">
    <div class="plate-wrap"><div class="plate-inner">
      <div class="opt-bar" id="ON"></div>
      <div class="plate"><canvas id="C" width="1460" height="1460"></canvas></div>
    </div></div>
  </div>
  <div class="panel-specs">
    <div class="annot" id="DSC"></div>
    <div class="specs-rule"></div>
    <div class="specs" id="SPC"></div>

  </div>
</div>

<script>
const CW=1460,ink='#5c5045',inkL='rgba(72,60,48,0.22)',inkM='rgba(72,60,48,0.4)',
inkFl='rgba(160,130,75,0.04)',cotFl='rgba(160,130,75,0.08)',stvFl='rgba(110,75,35,0.14)',
brFl='rgba(130,100,50,0.07)',brSt='rgba(72,60,48,0.4)',furFl='rgba(140,110,55,0.06)',
awnFl='rgba(160,130,75,0.03)',DA=1050,PG='#ece3d0';

function mkCtx(){
  const c=document.getElementById('C'),dpr=Math.min(window.devicePixelRatio||1,3);
  c.width=CW*dpr;c.height=CW*dpr;
  const x=c.getContext('2d');
  x.fillStyle=PG;x.fillRect(0,0,CW*dpr,CW*dpr);
  const id=x.getImageData(0,0,CW*dpr,CW*dpr);
  for(let k=0;k<id.data.length;k+=4){const n=(Math.random()-.5)*12;id.data[k]+=n;id.data[k+1]+=n;id.data[k+2]+=n}
  x.putImageData(id,0,0);
  x.scale(dpr,dpr);
  const vg=x.createRadialGradient(CW/2,CW/2,180,CW/2,CW/2,CW/2);
  vg.addColorStop(0,'rgba(232,220,198,0)');vg.addColorStop(1,'rgba(120,95,55,0.07)');
  x.fillStyle=vg;x.fillRect(0,0,CW,CW);x.lineCap='round';x.lineJoin='round';return x;
}

function hl(x,x1,y1,x2,y2,c,w){x.strokeStyle=c||ink;x.lineWidth=w||2;x.beginPath();const s=14;for(let i=0;i<=s;i++){const t=i/s;const jx=(Math.random()-.5)*1.2;const jy=(Math.random()-.5)*1.2;const px=x1+(x2-x1)*t+jx;const py=y1+(y2-y1)*t+jy;i===0?x.moveTo(px,py):x.lineTo(px,py)}x.stroke()}
function hr(x,px,py,w,h,c,lw){hl(x,px,py,px+w,py,c,lw);hl(x,px+w,py,px+w,py+h,c,lw);hl(x,px+w,py+h,px,py+h,c,lw);hl(x,px,py+h,px,py,c,lw)}
function dl(x,x1,y1,x2,y2,c,w){x.strokeStyle=c||inkL;x.lineWidth=w||1.1;x.setLineDash([7,5]);x.beginPath();x.moveTo(x1,y1);x.lineTo(x2,y2);x.stroke();x.setLineDash([])}
function dimH(x,x1,x2,y,l){x.strokeStyle=inkM;x.lineWidth=.9;hl(x,x1,y-7,x1,y+7,inkM,.8);hl(x,x2,y-7,x2,y+7,inkM,.8);hl(x,x1+2,y,x2-2,y,inkM,.8);x.font='11px "Special Elite",monospace';const m=(x1+x2)/2;x.fillStyle=ink;x.textAlign='center';x.fillText(l,m,y+3)}
function dimV(x,px,y1,y2,l){x.strokeStyle=inkM;x.lineWidth=.9;hl(x,px-7,y1,px+7,y1,inkM,.8);hl(x,px-7,y2,px+7,y2,inkM,.8);hl(x,px,y1+2,px,y2-2,inkM,.8);x.save();x.translate(px,(y1+y2)/2);x.rotate(-Math.PI/2);x.font='11px "Special Elite",monospace';x.fillStyle=ink;x.textAlign='center';x.fillText(l,0,3);x.restore()}

function drawCot(x,px,py,w,h,lr,lt){
  x.fillStyle=cotFl;x.fillRect(px,py,w,h);hr(x,px,py,w,h,ink,1.8);
  hl(x,px,py,px+w,py+h,inkL,.6);hl(x,px+w,py,px,py+h,inkL,.6);
  if(w<h)hl(x,px,py+h/2,px+w,py+h/2,inkM,.9);else hl(x,px+w/2,py,px+w/2,py+h,inkM,.9);

  x.save();x.translate(px+w/2,py+h/2);x.rotate(lr);
  x.font='600 14px "Cormorant Garamond",serif';x.fillStyle=ink;x.textAlign='center';
  x.fillText(lt||'HERITAGE COT',0,-4);
  x.restore();
}

function drawQueen(x,px,py,w,h,lr){
  // Fill + border
  x.fillStyle=cotFl;x.fillRect(px,py,w,h);hr(x,px,py,w,h,ink,1.8);
  // Ticking lines across the width
  x.strokeStyle='rgba(44,32,21,0.07)';x.lineWidth=.5;
  const tickDir=w>h;

  // Pillow — short end, two side-by-side rectangles
  const pL=Math.min(w,h)*.14,pW=(Math.max(w,h)*.44);
  x.fillStyle='rgba(160,130,75,0.06)';x.strokeStyle=inkM;x.lineWidth=.9;
  if(h>w){
    // vertical — pillows at top
    x.fillRect(px+4,py+4,w/2-6,pL);x.strokeRect(px+4,py+4,w/2-6,pL);
    x.fillRect(px+w/2+2,py+4,w/2-6,pL);x.strokeRect(px+w/2+2,py+4,w/2-6,pL);
  } else {
    // horizontal — pillows at left
    x.fillRect(px+4,py+4,pL,h/2-6);x.strokeRect(px+4,py+4,pL,h/2-6);
    x.fillRect(px+4,py+h/2+2,pL,h/2-6);x.strokeRect(px+4,py+h/2+2,pL,h/2-6);
  }
  // Label
  x.save();x.translate(px+w/2,py+h/2);x.rotate(lr||0);
  x.font='600 14px "Cormorant Garamond",serif';x.fillStyle=ink;x.textAlign='center';
  x.fillText('QUEEN MATTRESS',0,-4);
  x.restore();
}


function drawBR(x,px,py,w,h,ps,lr){
  x.fillStyle=brFl;x.fillRect(px,py,w,h);hr(x,px,py,w,h,brSt,1.6);
  x.strokeStyle='rgba(44,32,21,0.1)';x.lineWidth=.5;

  const vW=Math.min(w,h)*.16;x.strokeStyle=inkM;x.lineWidth=1;x.setLineDash([3,2]);
  if(ps==='left')x.strokeRect(px,py+3,vW,h-6);else if(ps==='right')x.strokeRect(px+w-vW,py+3,vW,h-6);
  else if(ps==='top')x.strokeRect(px+3,py,w-6,vW);else x.strokeRect(px+3,py+h-vW,w-6,vW);
  x.setLineDash([]);
  const pS=Math.min(w,h)*.22;x.fillStyle='rgba(160,130,75,0.03)';x.strokeStyle='rgba(72,60,48,0.15)';x.lineWidth=.8;
  if(ps==='left'){x.fillRect(px+3,py+3,pS,h-6);x.strokeRect(px+3,py+3,pS,h-6)}
  else if(ps==='right'){x.fillRect(px+w-3-pS,py+3,pS,h-6);x.strokeRect(px+w-3-pS,py+3,pS,h-6)}
  else if(ps==='top'){x.fillRect(px+3,py+3,w-6,pS);x.strokeRect(px+3,py+3,w-6,pS)}
  else{x.fillRect(px+3,py+h-3-pS,w-6,pS);x.strokeRect(px+3,py+h-3-pS,w-6,pS)}
  x.save();x.translate(px+w/2,py+h/2);x.rotate(lr);
  x.font='600 14px "Cormorant Garamond",serif';x.fillStyle=ink;x.textAlign='center';
  x.fillText('COWBOY BEDROLL \u2014 34\u2033',0,0);x.restore();
}

function drawChairS(x,cx,cy,rot,s){
  const cw=23*s,cd=27*s;x.save();x.translate(cx,cy);x.rotate(rot||0);
  x.fillStyle=furFl;x.beginPath();x.ellipse(0,0,cw/2,cd/2,0,0,Math.PI*2);x.fill();
  x.strokeStyle=inkM;x.lineWidth=1.2;x.beginPath();x.ellipse(0,0,cw/2,cd/2,0,0,Math.PI*2);x.stroke();
  hl(x,-cw/2+4,-cd/2+4,cw/2-4,cd/2-4,'rgba(44,32,21,0.15)',.6);hl(x,cw/2-4,-cd/2+4,-cw/2+4,cd/2-4,'rgba(44,32,21,0.15)',.6);
  x.font='600 14px "Cormorant Garamond",serif';x.fillStyle=ink;x.textAlign='center';x.fillText('BUTTERFLY',0,-2);x.fillText('CHAIR',0,8);x.restore();
}

function drawTable(x,cx,cy,w,h,label,dim,isRoll){
  const px=cx-w/2,py=cy-h/2;x.fillStyle=furFl;x.fillRect(px,py,w,h);hr(x,px,py,w,h,ink,isRoll?1.5:1.3);
  x.strokeStyle=isRoll?'rgba(44,32,21,0.1)':'rgba(44,32,21,0.06)';x.lineWidth=isRoll?.5:.4;

  x.font='600 14px "Cormorant Garamond",serif';x.fillStyle=ink;x.textAlign='center';
  x.fillText(label||'PANGEAN',cx,cy-3);x.fillText('TABLE',cx,cy+7);
  
}

// ═══════ BASE RENDERERS ═══════
function drawShackletonBase(x,FLOOR,PEAK,CH,JH,doorW,cO,winW,sL,sW,fL,fW,dimLabel){
  const s=DA/FLOOR,i2p=v=>v*s,m=(CW-DA)/2,tx=m,ty=m,tw=DA,th=DA;
  x.fillStyle=inkFl;x.fillRect(tx,ty,tw,th);hr(x,tx,ty,tw,th,ink,3);
  [[tx,ty],[tx+tw,ty],[tx+tw,ty+th],[tx,ty+th]].forEach(([cx,cy])=>{x.strokeStyle=inkM;x.lineWidth=1.3;x.beginPath();x.arc(cx,cy,10,0,Math.PI*2);x.stroke();hl(x,cx-4,cy,cx+4,cy,inkM,.8);hl(x,cx,cy-4,cx,cy+4,inkM,.8)});
  const bo=i2p(6);x.strokeStyle=inkL;x.lineWidth=1;x.setLineDash([5,4]);x.strokeRect(tx+bo,ty+bo,tw-bo*2,th-bo*2);x.setLineDash([]);
  // Front wall — door on right, inner edge at center pole axis
  const fDW=tw*0.3125,fDL=tx+tw/2,fDR=fDL+fDW;
  hl(x,fDL,ty,fDR,ty,'rgba(232,220,198,0.9)',4);
  x.strokeStyle=ink;x.lineWidth=1.8;x.beginPath();x.moveTo(fDL,ty);x.lineTo(fDL-12,ty-22);x.stroke();x.beginPath();x.moveTo(fDR,ty);x.lineTo(fDR+12,ty-22);x.stroke();
  x.font='600 14px "Cormorant Garamond",serif';x.fillStyle=ink;x.textAlign='center';x.fillText('FRONT DOOR',(fDL+fDR)/2,ty-30);
  const fWW=tw*0.229,fWCX=tx+tw/4;
  x.strokeStyle=inkM;x.lineWidth=1.3;x.beginPath();x.moveTo(fWCX-fWW/2,ty);x.lineTo(fWCX-fWW/2,ty-10);x.stroke();x.beginPath();x.moveTo(fWCX+fWW/2,ty);x.lineTo(fWCX+fWW/2,ty-10);x.stroke();
  hl(x,fWCX-fWW/2,ty,fWCX+fWW/2,ty,inkL,1.5);
  x.font='600 14px "Cormorant Garamond",serif';x.fillStyle=ink;x.textAlign='center';x.fillText('WINDOW',fWCX,ty-30);
  // Rear wall — door on left (mirrored), inner edge at center pole axis
  const rdy=ty+th,rDR2=tx+tw/2,rDL2=rDR2-fDW;
  hl(x,rDL2,rdy,rDR2,rdy,'rgba(232,220,198,0.9)',4);
  x.strokeStyle=ink;x.lineWidth=1.8;x.beginPath();x.moveTo(rDL2,rdy);x.lineTo(rDL2-12,rdy+22);x.stroke();x.beginPath();x.moveTo(rDR2,rdy);x.lineTo(rDR2+12,rdy+22);x.stroke();
  x.font='600 14px "Cormorant Garamond",serif';x.fillStyle=ink;x.textAlign='center';x.fillText('REAR DOOR',(rDL2+rDR2)/2,rdy+38);
  const rWCX=tx+tw*3/4;x.strokeStyle=inkM;x.lineWidth=1.3;
  x.beginPath();x.moveTo(rWCX-fWW/2,rdy);x.lineTo(rWCX-fWW/2,rdy+10);x.stroke();x.beginPath();x.moveTo(rWCX+fWW/2,rdy);x.lineTo(rWCX+fWW/2,rdy+10);x.stroke();
  hl(x,rWCX-fWW/2,rdy,rWCX+fWW/2,rdy,inkL,1.5);x.fillText('WINDOW',rWCX,rdy+38);
  // Guy lines
  [[tx,ty,-1,-1],[tx+tw,ty,1,-1],[tx+tw,ty+th,1,1],[tx,ty+th,-1,1]].forEach(([gx,gy,dx,dy])=>{const gl=38,ex=gx+dx*gl*.707,ey=gy+dy*gl*.707;dl(x,gx,gy,ex,ey,inkL,1);x.fillStyle=inkM;x.beginPath();x.arc(ex,ey,3.5,0,Math.PI*2);x.fill()});
  // Center pole
  const cpx=tx+tw/2,cpy=ty+th/2;
  dl(x,cpx-20,cpy,cpx+20,cpy,inkM,1);dl(x,cpx,cpy-20,cpx,cpy+20,inkM,1);
  x.strokeStyle=ink;x.lineWidth=2.2;x.beginPath();x.arc(cpx,cpy,9,0,Math.PI*2);x.stroke();
  x.fillStyle=ink;x.beginPath();x.arc(cpx,cpy,3.5,0,Math.PI*2);x.fill();
  x.font='italic 13px "IM Fell English",serif';x.fillStyle=ink;x.textAlign='center';x.fillText('Center Pole',cpx,cpy+26);
  // Stove jack

      '14\u00d714':{bt:{pw:'77 lbs 8 oz',pd:'14\u2033\u00d714\u2033\u00d742\u2033',shell:'63 lbs'},rf:{pw:'79 lbs',pd:'12\u2033\u00d715\u2033\u00d742\u2033',shell:'47 lbs 11 oz',floor:'17 lbs 1 oz'},poles:'6 lbs 4 oz',spikes:'4 lbs 2 oz',fa:'203 sq ft',peak:'120\u2033',corner:'24\u2033',jh:'105\u2033',sp:16,stv:'Large'}
    },
    'prairie':{
      '8\u00d78':{pw:'38 lbs',pd:'12\u2033\u00d712\u2033\u00d730\u2033',fa:'57.5 sq ft',peak:'82\u2033',jh:'66\u2033',sp:12,stv:'Medium'},
      '10\u00d710':{pw:'47 lbs',pd:'12\u2033\u00d712\u2033\u00d735\u2033',fa:'90.25 sq ft',peak:'106\u2033',jh:'90\u2033',sp:12,stv:'Medium'},
      '12\u00d712':{pw:'60 lbs',pd:'14\u2033\u00d712\u2033\u00d738\u2033',fa:'132.25 sq ft',peak:'118\u2033',jh:'104\u2033',sp:12,stv:'Large'}
    },
    'split-torrent':{
      '8\u00d711':{pw:'48 lbs',pd:'14\u2033\u00d78\u2033\u00d738\u2033',fa:'45.4 sq ft cabin + 48.1 sq ft awning',peak:'96\u2033',jh:'84\u2033 (awning)',sp:16,stv:'Medium'},
      '11\u00d714':{pw:'66 lbs',pd:'15\u2033\u00d712\u2033\u00d740\u2033',fa:'76.1 sq ft cabin + 87 sq ft awning',peak:'108\u2033',jh:'94\u2033 (awning + cabin)',sp:16,stv:'Large'}
    }
  };
  const td=TD[curLine]&&TD[curLine][sz.key]||{};
  const isShack=curLine==='shackleton';
  // ── THE TENT ──
  const tentLineName=line.name.replace('The ','').replace(' Tent','');
  h.push('<div class="spec-section">'+hdr('The Tent \u2014 '+tentLineName+' '+sz.label));
  if(isShack){
    h.push('<div class="spec-cols"><div class="spec-col">');
    h.push('<div class="col-title">Bathtub Floor</div>');
    h.push(sl('Packed Weight',td.bt.pw));
    h.push(sl('Packed Size',td.bt.pd));
    h.push(sl('Shell Weight',td.bt.shell));
    h.push('</div><div class="spec-col">');
    h.push('<div class="col-title">Removable Floor</div>');
    h.push(sl('Packed Weight',td.rf.pw));
    h.push(sl('Packed Size',td.rf.pd));
    h.push(sl('Shell Weight',td.rf.shell));
    h.push(sl('Floor Weight',td.rf.floor));
    h.push('</div></div>');
    h.push(li('Floor Area',td.fa));
    h.push(li('Peak Height',td.peak));
    h.push(li('Corner Height',td.corner));
    h.push(li('Pole Weight',td.poles));
    h.push(li('Spike Weight',td.spikes));
    h.push(li('Spikes',td.sp+' aluminum'));
    h.push(li('Shell','7 oz Sunforger canvas'));
    h.push(li('Structure',sp.Structure||''));
  }else{
    h.push('<div class="gear-list">');
    h.push(li('Floor Area',td.fa||''));
    h.push(li('Peak Height',td.peak||''));
    h.push(li('Packed Weight',td.pw||''));
    h.push(li('Packed Size',td.pd||''));
    h.push(li('Spikes',(td.sp||'')+' aluminum'));
    h.push(li('Shell','7 oz Sunforger canvas'));
    h.push(li('Structure',sp.Structure||''));
    h.push('</div>');
  }
  h.push('</div>');
  // ── ELLIS ACCESSORIES ──
  const d=layout.desc;
  const acc=[];
  // Cots
  const aCotM=d.match(/(\w+)\s+Heritage\s+Cot/i);
  if(aCotM){const n={'One':1,'Two':2,'Three':3,'Four':4,'Five':5}[aCotM[1]]||1;acc.push(li('Heritage Cot',n+'\u00d7'));}
  // Bedrolls
  const aBrM=d.match(/(\w+)\s+34["\u2033]\s+Cowboy\s+Bedroll/i)||d.match(/(\w+)\s+Cowboy\s+Bedroll/i);
  if(aBrM){const n={'One':1,'Two':2,'Three':3,'Four':4}[aBrM[1]]||1;acc.push(li('34\u2033 Cowboy Bedroll',n+'\u00d7'));}
  // Queen mattress
  if(d.match(/queen\s+mattress/i)) acc.push(li('Queen Mattress','1\u00d7'));
  // Stove
  if(layout.stove) acc.push(li(sz.specs.Stove||sz.specs.Stoves||'Nomad View','1\u00d7'));
  // Chairs
  const aChairCt=d.match(/[Ff]our.{0,5}chairs?/i)?4:d.match(/[Tt]hree.{0,5}chairs?/i)?3:d.match(/[Tt]wo.{0,5}chairs?/i)?2:d.match(/chair/i)?1:0;
  if(aChairCt) acc.push(li('Pangean Butterfly Chair',aChairCt+'\u00d7'));
  // Tables
  const aHasRoll=d.match(/[Rr]oll\s*[Tt]op/i);
  const aHasLgTbl=d.match(/large table/i);
  const aHasSmTbl=d.match(/small table/i);
  const aTableCt=d.match(/[Tt]wo tables/i)?2:d.match(/table/i)?1:0;
  if(aHasRoll) acc.push(li('Pangean Roll Top Table','1\u00d7'));
  if(aHasLgTbl) acc.push(li('Pangean Folding Table \u2014 Large','1\u00d7'));
  if(aHasSmTbl) acc.push(li('Pangean Folding Table \u2014 Small','1\u00d7'));
  if(!aHasRoll&&!aHasLgTbl&&!aHasSmTbl&&aTableCt===1) acc.push(li('Pangean Folding Table \u2014 Large','1\u00d7'));
  if(acc.length){
    h.push('<div class="spec-section">'+hdr('Ellis Accessories'));
    acc.forEach(a=>h.push(a));
    h.push('</div>');
  }
  document.getElementById('SPC').innerHTML=h.join('');
}
function init(){
  const ln=document.getElementById('LN');
  ln.innerHTML=Object.keys(T).map(k=>'<button class="nav-btn'+(k===curLine?' on':'')+'" data-l="'+k+'">'+T[k].name.replace('The ','').replace(' Tent','')+'</button>').join('');
  ln.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{curLine=b.dataset.l;curSI=0;curLI=0;buildSN();render();ln.querySelectorAll('.nav-btn').forEach(v=>v.classList.toggle('on',v.dataset.l===curLine))}));
  buildSN();render();
}
function buildSN(){
  const sn=document.getElementById('SN');
  sn.innerHTML=T[curLine].sizes.map((s,i)=>'<button class="sz-btn'+(i===curSI?' on':'')+'" data-i="'+i+'">'+s.label+'</button>').join('');
  sn.querySelectorAll('.sz-btn').forEach(b=>b.addEventListener('click',()=>{curSI=+b.dataset.i;curLI=0;render();sn.querySelectorAll('.sz-btn').forEach(v=>v.classList.toggle('on',+v.dataset.i===curSI))}));
}
window.addEventListener('DOMContentLoaded',init);
</script>
